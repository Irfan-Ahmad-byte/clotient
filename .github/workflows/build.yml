name: Build & Release Clotient Studio

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: false

permissions:
  contents: write

env:
  PUBLIC_REPO: Irfan-Ahmad-byte/closhell-releases

jobs:
  # ─── Create Tag if new version ────────────────────────────
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tagger.outputs.tag }}
      should_release: ${{ steps.tagger.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tag version
        id: tagger
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="v$VERSION"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.version }}" ]]; then
              TAG_NAME="${{ github.event.inputs.version }}"
              echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
            fi
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            # Fetch tags from remote
            git fetch --tags
            if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME already exists. Skipping tag creation."
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "Creating tag $TAG_NAME"
              git config --global user.name "github-actions[bot]"
              git config --global user.email "github-actions[bot]@users.noreply.github.com"
              git tag "$TAG_NAME"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "$TAG_NAME"
              echo "should_release=true" >> $GITHUB_OUTPUT
            fi
          fi

  # ─── Build on each platform ───────────────────────────────
  build:
    needs: create-tag
    if: needs.create-tag.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: clotient

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: clotient

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux dependencies
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Inject Version
        shell: bash
        run: |
          TAG="${{ needs.create-tag.outputs.tag }}"
          VERSION="${TAG#v}"
          echo "Setting version to: $VERSION"

          node -e "
          const fs = require('fs');
          const version = '$VERSION';
          
          // Update tauri.conf.json
          const tauriPath = 'src-tauri/tauri.conf.json';
          if (fs.existsSync(tauriPath)) {
            const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
            tauri.version = version;
            fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2));
            console.log('Updated tauri.conf.json');
          }

          // Update Cargo.toml
          const cargoPath = 'src-tauri/Cargo.toml';
          if (fs.existsSync(cargoPath)) {
            let cargo = fs.readFileSync(cargoPath, 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"' + version + '\"');
            fs.writeFileSync(cargoPath, cargo);
            console.log('Updated Cargo.toml');
          }

          // Update package.json
          const pkgPath = 'package.json';
          if (fs.existsSync(pkgPath)) {
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log('Updated package.json');
          }
          "

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clotient/src-tauri

      - name: Build Frontend
        run: npm run build

      - name: Build Tauri App
        run: npx tauri build

      # Upload Linux Artifacts
      - name: Upload Linux Artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: |
            clotient/src-tauri/target/release/bundle/deb/*.deb
            clotient/src-tauri/target/release/bundle/rpm/*.rpm
            clotient/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      # Upload Windows Artifacts
      - name: Upload Windows Artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: |
            clotient/src-tauri/target/release/bundle/msi/*.msi
            clotient/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # Upload macOS Artifacts
      - name: Upload macOS Artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundles
          path: |
            clotient/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ─── Publish Release ──────────────────────────────────────
  release:
    needs: [create-tag, build]
    runs-on: ubuntu-latest
    if: needs.create-tag.outputs.should_release == 'true'

    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/linux

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: artifacts/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-bundles
          path: artifacts/macos

      - name: Flatten Artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) -exec cp {} release/ \;
          ls -lah release/

      - name: Create Release on Public Repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PUBLIC_REPO }}
          token: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          tag_name: ${{ needs.create-tag.outputs.tag }}
          name: Clotient Studio ${{ needs.create-tag.outputs.tag }}
          body: |
            ## Clotient Studio ${{ needs.create-tag.outputs.tag }}

            Lightweight, local-first API client desktop application.

            ### Downloads

            | Platform | File | Type |
            |----------|------|------|
            | 🐧 Linux (Debian/Ubuntu) | `.deb` | Installer |
            | 🐧 Linux (Fedora/RHEL) | `.rpm` | Installer |
            | 🐧 Linux (Universal) | `.AppImage` | Portable |
            | 🪟 Windows | `.msi` | Installer |
            | 🪟 Windows | `.exe` | NSIS Installer |
            | 🍏 macOS | `.dmg` | Disk Image |

            ---
            🔗 [Report Issues](https://github.com/${{ env.PUBLIC_REPO }}/issues)
          draft: false
          prerelease: false
          files: release/*
